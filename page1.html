<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page 1</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientMove 6s ease infinite;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            color: white;
            font-family: Arial, sans-serif;
            font-size: 3rem;
            text-align: center;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 10;
        }

        .floating {
            position: absolute;
            font-size: 2rem;
            animation: float linear infinite;
            user-select: none;
            pointer-events: none;
        }

        @keyframes float {
            0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        @keyframes sway {
            0%   { transform: translateY(110vh) translateX(0px) rotate(0deg); opacity: 0; }
            10%  { opacity: 1; }
            25%  { transform: translateY(75vh) translateX(20px) rotate(15deg); }
            50%  { transform: translateY(50vh) translateX(-20px) rotate(-10deg); }
            75%  { transform: translateY(25vh) translateX(15px) rotate(10deg); }
            90%  { opacity: 1; }
            100% { transform: translateY(-10vh) translateX(0px) rotate(0deg); opacity: 0; }
        }

        .bee { animation-name: sway; }
    </style>
</head>
<body>
    <h1>Hello world, a inceput cursul de vibecoding! 😊</h1>

    <script>
        const flowers = ['🌸', '🌺', '🌼', '🌻', '🌷', '💐'];
        const bees = ['🐝', '🐝'];

        function createElement(emojis, isBee) {
            const el = document.createElement('div');
            el.classList.add('floating');
            if (isBee) el.classList.add('bee');
            el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            el.style.left = Math.random() * 100 + 'vw';
            el.style.fontSize = (1.5 + Math.random() * 1.5) + 'rem';
            const duration = 6 + Math.random() * 8;
            el.style.animationDuration = duration + 's';
            el.style.animationDelay = (Math.random() * 5) + 's';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), (duration + 5) * 1000);
        }

        function spawnFlower() {
            createElement(flowers, false);
            setTimeout(spawnFlower, 600 + Math.random() * 800);
        }

        function spawnBee() {
            createElement(bees, true);
            setTimeout(spawnBee, 1500 + Math.random() * 2000);
        }

        spawnFlower();
        spawnBee();
    </script>
</body>
</html>
